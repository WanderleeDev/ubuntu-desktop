<div
  class="flex flex-col gap-6 animate-in fade-in duration-500 max-w-full overflow-x-hidden">
  <!-- Header Simple -->
  <div class="flex items-center justify-between mb-2">
    <h3 class="text-base font-bold text-white/90">Background</h3>
    <button
      class="flex items-center gap-2 text-white/90 hover:text-white transition-colors py-1 px-3 hover:bg-white/5 rounded-md border border-transparent hover:border-white/10 active:bg-white/10">
      <span class="material-symbols-outlined text-xl">add</span>
      <span class="text-sm font-medium">Add Picture...</span>
    </button>
  </div>

  <!-- Main Background Card -->
  <div
    class="bg-[#2d2d2d] rounded-2xl border border-white/5 overflow-hidden shadow-xl">
    <!-- Section 1: Current Selection -->
    <div class="p-8 pb-6">
      <div
        class="relative w-full aspect-video sm:aspect-[21/9] rounded-xl overflow-hidden border border-white/10 group shadow-lg bg-black">
        @if (store.currentWallpaper(); as wpUrl) {
          <img
            [src]="wpUrl"
            alt="Current Background"
            class="w-full h-full object-cover" />

          <!-- Selected Indicators -->
          <div class="absolute top-4 right-4 flex gap-2">
            <button
              (click)="store.resetWallpaper()"
              class="w-8 h-8 flex items-center justify-center bg-black/60 hover:bg-black/80 rounded-full text-white transition-all scale-0 group-hover:scale-100 border border-white/10">
              <span class="material-symbols-outlined text-sm">close</span>
            </button>
            <div
              class="w-8 h-8 flex items-center justify-center bg-orange-500 rounded-full text-white shadow-lg border border-white/20">
              <span class="material-symbols-outlined text-sm font-bold"
                >check</span
              >
            </div>
          </div>
        } @else {
          <div class="absolute inset-0 flex items-center justify-center">
            <span class="text-white/20 text-sm font-medium italic">No wallpaper selected</span>
          </div>
        }
      </div>
    </div>

    <!-- Separator -->
    <div class="h-px bg-white/5 mx-8"></div>

    <!-- Section 2: Options Grid -->
    <div class="p-8 pt-6">
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
        @for (wpUrl of store.wallpapers(); track wpUrl) {
          <button
            (click)="store.selectWallpaper(wpUrl)"
            [class]="
              'relative aspect-video rounded-lg overflow-hidden transition-all duration-200 group border border-transparent ' +
              (store.currentWallpaper() === wpUrl
                ? 'ring-2 ring-orange-500 ring-offset-4 ring-offset-[#2d2d2d]'
                : 'hover:border-white/20 hover:scale-[1.02]')
            ">
            <img
              [src]="wpUrl"
              alt="Wallpaper option"
              class="w-full h-full object-cover" />

            @if (store.currentWallpaper() === wpUrl) {
              <div class="absolute inset-0 bg-black/20"></div>
            }

            <div
              class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
          </button>
        }
      </div>
    </div>
  </div>
</div>
