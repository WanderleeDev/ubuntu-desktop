<div
  class="flex flex-col gap-8 animate-in fade-in duration-500 max-w-full overflow-x-hidden pb-10">
  <div class="flex flex-col items-center gap-6 py-8">
    <div class="relative w-32 h-32 flex items-center justify-center">
      <img
        ngSrc="assets/extra-icons/ubuntu.svg"
        alt="Ubuntu"
        fill
        class="object-contain scale-125" />
    </div>
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-text tracking-tight">
        Ubuntu 20.04 LTS
      </h2>
      <p class="text-text/40 text-sm mt-1 font-medium italic">
        Focal Fossa Edition
      </p>
    </div>
  </div>

  <div class="flex flex-col gap-4">
    <h3
      class="text-xs font-black uppercase tracking-[0.2em] text-text/20 px-1">
      Developed By
    </h3>
    <div
      class="bg-tertiary rounded-3xl border border-white/10 p-8 shadow-2xl relative overflow-hidden group">
      <div
        class="absolute -top-24 -right-24 w-48 h-48 bg-system/10 blur-[80px] rounded-full group-hover:bg-system/20 transition-colors duration-700"></div>

      <div class="relative flex items-center gap-8">
        <div
          class="relative w-20 h-20 rounded-2xl overflow-hidden shadow-xl border-2 border-system/50">
          <img
            [ngSrc]="developerInfo.avatarUrl"
            [alt]="developerInfo.name"
            fill
            class="object-cover scale-105 group-hover:scale-110 transition-transform duration-500" />
        </div>
        <div class="flex flex-col gap-1">
          <h4 class="text-2xl font-bold text-text">
            {{ developerInfo.name }}
          </h4>
          <span
            class="text-system font-bold text-sm uppercase tracking-widest"
            >{{ developerInfo.role }}</span
          >
          <p class="text-text/40 text-sm mt-3 leading-relaxed max-w-md">
            {{ developerInfo.bio }}
          </p>
        </div>
      </div>

      <div class="flex gap-4 mt-8 pt-8 border-t border-white/5">
        <app-nautilus-button
          label="GitHub"
          icon="code"
          [href]="developerInfo.github"
          target="_blank" />
        <app-nautilus-button
          label="Contact"
          icon="mail"
          [href]="'mailto:' + developerInfo.email" />
      </div>
    </div>
  </div>

  <div class="flex flex-col gap-4">
    <h3
      class="text-xs font-black uppercase tracking-[0.2em] text-text/20 px-1">
      System Information
    </h3>
    <div
      class="bg-tertiary rounded-2xl border border-white/5 overflow-hidden shadow-xl">
      <div class="flex flex-col divide-y divide-white/5">
        @for (spec of systemSpecs; track spec.label) {
          <div class="flex items-center justify-between p-5">
            <span class="text-sm font-medium text-text/40">{{
              spec.label
            }}</span>
            <span class="text-sm font-bold text-text/90">{{
              spec.value
            }}</span>
          </div>
        }
      </div>
    </div>
  </div>

  <div class="text-center py-6">
    <p class="text-[10px] text-text/10 font-bold uppercase tracking-widest">
      Built with Angular & Tailwind CSS &bull; 2024
    </p>
  </div>
</div>
