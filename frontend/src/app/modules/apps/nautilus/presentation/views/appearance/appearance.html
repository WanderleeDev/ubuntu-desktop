<div
  class="flex flex-col gap-8 animate-in fade-in duration-500 max-w-full overflow-x-hidden">
  <div class="flex flex-col gap-4">
    <h3 class="text-base font-bold text-text/90">Style</h3>

    <div
      class="bg-tertiary rounded-2xl border border-white/5 overflow-hidden shadow-xl">
      <div class="p-8">
        <div class="grid grid-cols-2 gap-8 max-w-2xl mx-auto">
          <div class="flex flex-col items-center gap-4">
            <button
              type="button"
              [class.ring-2]="isLightTheme()"
              [class.ring-system]="isLightTheme()"
              [class.ring-offset-4]="isLightTheme()"
              [class.ring-offset-tertiary]="isLightTheme()"
              (click)="themeService.select('light')"
              class="relative w-full aspect-4/3 rounded-xl overflow-hidden transition-all duration-200 group border-2 border-transparent hover:border-white/10">
              <div
                class="absolute inset-0 bg-[#3484c4] flex items-center justify-center">
                <div class="relative w-3/4 h-3/4">
                  <div
                    class="absolute right-0 top-0 w-2/3 h-2/3 bg-[var(--bg-darker)] rounded-md shadow-lg border border-white/5"></div>
                  <div
                    class="absolute left-0 bottom-0 w-2/3 h-2/3 bg-[#ebebeb] rounded-md shadow-xl border border-black/10"></div>
                </div>
              </div>
              @if (isLightTheme()) {
              <app-check-badge />
              }
            </button>
            <span class="text-sm font-medium text-text/70">Default</span>
          </div>

          <div class="flex flex-col items-center gap-4">
            <button
              type="button"
              (click)="themeService.select('dark')"
              [class.ring-2]="isDarkTheme()"
              [class.ring-system]="isDarkTheme()"
              [class.ring-offset-4]="isDarkTheme()"
              [class.ring-offset-tertiary]="isDarkTheme()"
              class="relative w-full aspect-[4/3] rounded-xl overflow-hidden transition-all duration-200 group border-2 border-transparent hover:border-white/10">
              <div
                class="absolute inset-0 bg-[#3484c4] flex items-center justify-center">
                <div class="relative w-3/4 h-3/4">
                  <div
                    class="absolute right-0 top-0 w-2/3 h-2/3 bg-[#262626] rounded-md shadow-lg border border-white/5 opacity-80"></div>
                  <div
                    class="absolute left-0 bottom-0 w-2/3 h-2/3 bg-[var(--bg-darker)] rounded-md shadow-xl border border-white/10"></div>
                </div>
              </div>
              @if (isDarkTheme()) {
              <app-check-badge />
              }
            </button>
            <span class="text-sm font-medium text-text/70">Dark</span>
          </div>
        </div>
      </div>

      <div class="h-px bg-text/5 mx-8"></div>

      <div class="p-8 flex items-center gap-6">
        <span class="text-sm font-medium text-text/90">Color</span>
        <div class="flex flex-wrap items-center gap-3">
          @for (color of accentColors; track color.hex) {
          <button
            type="button"
            (click)="store.setAccentColor(color.hex)"
            class="group relative w-8 h-8 rounded-full transition-transform hover:scale-110 active:scale-95"
            [style.background-color]="color.hex">
            @if (store.accentColor() === color.hex) {
            <div
              class="absolute -inset-1.5 rounded-full border-2 border-system animate-in zoom-in duration-300"
              [style.border-color]="color.hex"></div>
            }
          </button>
          }
        </div>
      </div>
    </div>
  </div>
</div>
