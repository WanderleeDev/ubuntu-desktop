<div
  class="flex flex-col gap-6 animate-in fade-in duration-500 max-w-full overflow-x-hidden">
  <div class="flex items-center justify-between mb-2">
    <h3 class="text-base font-bold text-text/90">Applications</h3>
    <div class="flex items-center gap-2">
      <span class="text-xs text-text/40 font-medium"
        >{{ apps.length }} apps installed</span
      >
    </div>
  </div>

  <div
    class="bg-tertiary rounded-2xl border border-white/5 overflow-hidden shadow-xl">
    <div class="flex flex-col divide-y divide-white/5">
      @for (app of apps; track app.id) {
      <button
        type="button"
        class="flex items-center justify-between p-4 hover:bg-white/5 transition-colors group text-left">
        <div class="flex items-center gap-5">
          <div
            class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center p-2 group-hover:bg-white/10 transition-colors shadow-inner">
            <img
              [ngSrc]="app.icon"
              [alt]="app.label"
              width="48"
              height="48"
              class="object-contain" />
          </div>
          <div class="flex flex-col">
            <span
              class="text-sm font-bold text-text/90 group-hover:text-text transition-colors"
              >{{ app.label }}</span
            >
            <span class="text-xs text-text/30 leading-tight mt-0.5"
              >{{ app.description }}</span
            >
          </div>
        </div>
        <div class="flex items-center gap-4">
          <span
            class="material-symbols-outlined text-text/10 group-hover:text-text/40 transition-colors"
            >chevron_right</span
          >
        </div>
      </button>
      }
    </div>
  </div>

  <div class="bg-system/5 border border-system/10 rounded-2xl p-6 mt-2">
    <div class="flex items-start gap-4">
      <div
        class="w-10 h-10 rounded-full bg-system/20 flex items-center justify-center text-system shrink-0">
        <span class="material-symbols-outlined">info</span>
      </div>
      <div>
        <h4 class="text-sm font-bold text-system">About App Permissions</h4>
        <p class="text-xs text-text/40 leading-relaxed mt-1">
          Select an application to view and manage its permissions, notification
          settings, and default handlers.
        </p>
      </div>
    </div>
  </div>
</div>
