<app-window [appTitle]="currentSection()" cdkDragBoundary="#container-boundary">
  <span class="u-padding-left text-text/80 font-medium" header> Settings </span>

  <div
    class="flex h-[600px] w-[1000px] bg-primary text-text overflow-hidden rounded-b-xl border border-text/5"
    body>
    <app-nautilus-sidebar class="h-full border-r border-text/10" />

    <div
      class="flex-1 overflow-y-auto bg-secondary/40 backdrop-blur-md custom-scrollbar px-8 py-8">
      @switch (currentSection()) { @case ('background') {
      <app-nautilus-background /> } @case ('appearance') {
      <app-nautilus-appearance /> } @case ('privacy') {
      <app-nautilus-privacy /> } @case ('notifications') {
      <app-nautilus-notifications /> } @case ('about') {
      <app-nautilus-about /> } @case ('applications') {
      <app-nautilus-applications /> } @case ('users') { <app-nautilus-users /> }
      @default { <app-nautilus-coming-soon /> } }
    </div>
  </div>
</app-window>
