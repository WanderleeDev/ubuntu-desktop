<app-window-wrapper
  [appTitle]="currentSection()"
  cdkDragBoundary="#container-boundary">
  <span class="u-padding-left text-text/80 font-medium" header> Settings </span>

  <div
    class="flex h-[600px] w-[1000px] bg-primary text-text overflow-hidden rounded-b-xl border border-text/5"
    body>
    <app-nautilus-sidebar class="h-full border-r border-text/10" />

    <div
      class="flex-1 overflow-y-auto bg-secondary/40 backdrop-blur-md custom-scrollbar px-8 py-8">
      @if (activeView.value(); as component) {
      <ng-container *ngComponentOutlet="component" />
      }
    </div>
  </div>
</app-window-wrapper>
