<div class="relative w-full group">
  <input
    class="w-full px-4 py-3 bg-[#2d2d2d] text-white border border-white/10 rounded-lg outline-none transition-all duration-200 placeholder:text-[#6b7280] focus:border-[#e95420] focus:ring-2 focus:ring-[#e95420]/20 group-hover:border-white/20"
    [formControl]="inputTask"
    (keydown.enter)="addTask()"
    autocomplete="off"
    placeholder="Escribe una nueva tarea..."
    type="text"
    name="task"
    id="inputTasks" />
</div>
