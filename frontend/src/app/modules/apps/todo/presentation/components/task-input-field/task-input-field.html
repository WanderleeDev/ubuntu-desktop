<div class="relative w-full group">
  <input
    class="w-full px-4 py-3 bg-tertiary text-text border border-text/10 rounded-lg outline-none transition-all duration-200 placeholder:text-muted focus:border-system focus:ring-2 focus:ring-system/20 group-hover:border-text/20"
    [formControl]="inputTask"
    (keydown.enter)="addTask()"
    autocomplete="off"
    placeholder="Enter a new task..."
    type="text"
    name="task"
    id="inputTasks" />
</div>
