<div class="relative w-full group">
  <input
    class="w-full px-4 py-3 bg-[var(--bg-dark)] text-white border border-white/10 rounded-lg outline-none transition-all duration-200 placeholder:text-[#6b7280] focus:border-[var(--color-system)] focus:ring-2 focus:ring-[var(--color-system)]/20 group-hover:border-white/20"
    [formControl]="inputTask"
    (keydown.enter)="addTask()"
    autocomplete="off"
    placeholder="Enter a new task..."
    type="text"
    name="task"
    id="inputTasks" />
</div>
