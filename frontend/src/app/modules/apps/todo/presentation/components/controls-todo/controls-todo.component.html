<div class="flex items-center gap-4">
  <div class="flex bg-black/20 p-1 rounded-lg">
    @for (control of taskControls; track control; let i = $index) {
      <button
        type="button"
        (click)="onClick(control, i)"
        [ngClass]="{
          'bg-[#e95420] text-white shadow-md': activeBtn() === i,
          'text-white/40 hover:text-white/70 hover:bg-white/5':
            activeBtn() !== i,
        }"
        class="px-3 py-1.5 text-[11px] font-bold uppercase tracking-wider rounded-md transition-all duration-200">
        {{ control }}
      </button>
    }
  </div>

  <button
    type="button"
    (click)="clearTodo()"
    class="flex items-center gap-2 px-3 py-1.5 text-[11px] font-bold uppercase tracking-wider text-red-400/70 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-all duration-200">
    <span class="material-symbols-outlined text-[16px] opacity-70">
      delete
    </span>

    Clear
  </button>
</div>
