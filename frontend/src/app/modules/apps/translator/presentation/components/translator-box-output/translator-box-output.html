@if ($translationState().loading) {
<app-translator-loader />
} @else if ($translationState().error) {
<div
  class="flex items-center gap-2 px-4 py-6 min-h-[120px] text-red-500 text-sm">
  <span class="material-symbols-outlined text-[20px] shrink-0">error</span>
  <span>{{ $translationState().error }}</span>
</div>
} @else {
<textarea
  [value]="$translationState().translation"
  readonly
  aria-label="Translation output"
  placeholder="Translation will appear here…"
  class="w-full min-h-[160px] resize-none bg-transparent p-4 text-sm leading-relaxed text-text/80 placeholder:text-text/25 outline-none border-none scrollStyle"></textarea>

<div
  class="flex items-center justify-between px-3 py-1.5 border-t border-text/10">
  <span class="text-[0.7rem] text-text/40">
    {{ $translationState().translation.length }} chars
  </span>

  @if ($translationState().translation) {
  <button
    type="button"
    title="Copy translation"
    class="flex items-center justify-center p-1 rounded-md text-text/35 hover:text-system hover:bg-system/10 active:scale-90 transition-all duration-150"
    [cdkCopyToClipboard]="$translationState().translation">
    <span class="material-symbols-outlined text-[17px]">content_copy</span>
  </button>
  }
</div>
}
