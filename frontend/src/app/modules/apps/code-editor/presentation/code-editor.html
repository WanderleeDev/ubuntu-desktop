<app-window-wrapper appTitle="Ubuntu Web Playground - Code Editor">
  <div
    body
    class="w-[920px] h-[620px] min-w-[600px] min-h-[400px] bg-[var(--bg-darker)] overflow-hidden flex flex-col font-sans">
    <div class="flex-1 flex overflow-hidden">
      <div class="w-12 h-full overflow-hidden">
        <app-editor-sidebar class="w-full h-full" />
      </div>

      <div
        class="flex-1 flex flex-col bg-[var(--bg-darker)] border-r border-white/5 overflow-hidden">
        <div
          class="flex items-center justify-between px-4 py-2 bg-[#252526] border-b border-white/5">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-blue-400 text-sm"
              >description</span
            >
            <span class="text-[11px] text-white/60 font-medium tracking-wide"
              >Workspace Editor</span
            >
          </div>

          <div class="flex items-center gap-2">
            <button
              type="button"
              (click)="store.togglePreview()"
              class="flex items-center gap-1.5 px-2 py-1 rounded hover:bg-white/5 transition-colors group"
              [title]="
                store.settings().showPreview ? 'Hide Preview' : 'Show Preview'
              ">
              <span
                class="material-symbols-outlined text-[18px]"
                [class.text-system]="store.settings().showPreview">
                {{
                  store.settings().showPreview ? "visibility" : "visibility_off"
                }}
              </span>
              <span
                class="text-[10px] text-white/40 group-hover:text-white/60 uppercase font-bold tracking-tighter"
                >Preview</span
              >
            </button>
          </div>
        </div>

        <div class="flex-1 relative overflow-hidden">
          <app-monaco-editor class="w-full h-full" />
        </div>
      </div>

      @if (store.settings().showPreview) {
        <div class="w-[480px] animate-in slide-in-from-right duration-300">
          <app-editor-preview class="w-full h-full" />
        </div>
      }
    </div>

    <app-editor-status-bar />
  </div>
</app-window-wrapper>
