<div
  class="bg-primary rounded-lg p-5 text-right shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)] min-h-[100px] flex flex-col justify-end gap-1 border border-text/5">
  <div class="text-base text-text/50 min-h-[1.5rem] font-['Inter']">
    {{ store.expression() }}
  </div>

  <div class="text-3xl text-text font-semibold leading-none font-['Outfit']">
    @if (store.result() !== null) {
      = {{ store.result() | number: "1.0-8" }}
    } @else {
      0
    }
  </div>

  @if (store.error()) {
    <div class="text-red-500 text-xs mt-1">
      {{ store.error() }}
    </div>
  }
</div>

@if (store.record().length > 0) {
  <div class="mt-3 p-3 bg-text/5 rounded-lg max-h-[120px] overflow-y-auto">
    <div
      class="text-[9px] uppercase text-text/40 font-bold mb-1 tracking-widest">
      History
    </div>
    @for (item of store.record(); track $index) {
      <div
        class="flex justify-between text-[11px] py-1.5 border-b border-text/5 text-text/60 last:border-0">
        <span>{{ item.expression }}</span>
        <span class="text-text font-medium">= {{ item.result }}</span>
      </div>
    }
  </div>
} @else {
  <div class="mt-2 scale-90">
    <app-calculator-record-empty />
  </div>
}
