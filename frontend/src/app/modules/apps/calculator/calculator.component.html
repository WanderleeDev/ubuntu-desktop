<app-window-wrapper
  appTitle="Calculator"
  *ngrxLet="{
    record: record$,
    hasAbsoluteFn: hasAbsoluteFn$,
  } as state">
  <app-calculator-undo-btn
    (click)="backHistory(state.record)"
    [isDisabled]="state.record.length <= 0"
    header />
  <div class="calculator" body>
    <div class="calculator-content">
      <app-calculator-display />
      <app-calculator-controls />
    </div>
  </div>
</app-window-wrapper>
