<div class="flex items-center gap-1">
  <button
    type="button"
    (click)="toggleFullscreen()"
    class="flex items-center justify-center p-1.5 rounded-md hover:bg-text/10 transition-colors text-text/70 hover:text-text"
    [title]="
      store.hasFullScreen()
        ? 'Mostrar herramientas'
        : 'Ocultar herramientas (Modo Zen)'
    ">
    <span class="material-symbols-outlined text-[20px]">
      {{ store.hasFullScreen() ? "visibility" : "visibility_off" }}
    </span>
  </button>

  <button
    type="button"
    (click)="download()"
    class="flex items-center justify-center p-1.5 rounded-md hover:bg-text/10 transition-colors text-text/70 hover:text-text"
    title="Descargar imagen">
    <span class="material-symbols-outlined text-[20px]">download</span>
  </button>
</div>
