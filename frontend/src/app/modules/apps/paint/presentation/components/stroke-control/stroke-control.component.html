<app-toolbar-container orientationBar="vertical">
  <div class="flex flex-col items-center gap-2 p-1">
    <button
      type="button"
      (click)="store.setStrokeWidth('increment')"
      class="p-1 rounded hover:bg-white/10 text-white transition-all active:scale-90"
      title="Aumentar grosor">
      <span class="material-symbols-outlined text-[20px]">add</span>
    </button>

    <div class="flex flex-col items-center justify-center min-w-[30px] py-1 border-y border-white/10">
      <span class="text-[10px] text-white/50 uppercase font-bold tracking-tighter">Size</span>
      <span class="text-[14px] text-white font-mono leading-none">
        {{ store.strokeWidth() }}
      </span>
    </div>

    <button
      type="button"
      (click)="store.setStrokeWidth('decrement')"
      class="p-1 rounded hover:bg-white/10 text-white transition-all active:scale-90"
      title="Disminuir grosor">
      <span class="material-symbols-outlined text-[20px]">remove</span>
    </button>
  </div>
</app-toolbar-container>
