<app-window appTitle="paint">
  <app-header-control-extra
    header
    [isActiveFullscreen]="store.hasFullScreen()" />

  <div
    class="relative h-[600px] w-[800px] bg-white flex items-center justify-center overflow-hidden"
    body>
    @if (store.hasColorBar() && !store.hasFullScreen()) {
    <app-colored-toolbar />
    }

    <app-canvas #canvas />

    @if (!store.hasFullScreen()) {
    <app-pencil-toolbar />
    }
  </div>
</app-window>
