<main
  class="w-screen h-screen overflow-hidden flex flex-col bg-gradient-to-br from-[#4c1141] via-[#772953] to-[#e95420] relative">
  <app-navbar-desktop />
  <app-sidebar [$mainIcons]="mainIcons" [$secondaryIcons]="secondaryIcons" />

  <div class="flex-1 relative ml-[48px] p-5 h-full">
    <!-- Desktop Icons Grid -->
    <ul
      class="grid grid-cols-[repeat(auto-fill,minmax(100px,1fr))] grid-rows-[repeat(auto-fill,minmax(100px,1fr))] gap-5 p-0 m-0 h-full">
      @for (icon of desktopIcons; track icon.id) {
        <li class="list-none">
          <app-app-item
            [$appData]="icon"
            [lazeComponent]="APPS[icon.app]"
            (click)="windowManager.openApp(icon.app)" />
        </li>
      }
    </ul>

    @for (window of windowManager.openedApps(); track window.id) {
      <div
        class="absolute pointer-events-auto z-0 left-2/4 -translate-x-1/2 top-2/4 -translate-y-1/2 starting:scale-50 transition-transform duration-200 origin-top"
        [tabindex]="window.id"
        (mousedown)="windowManager.focusApp(window.id)">
        <ng-container *ngComponentOutlet="resolveApp(window.app) | async" />
      </div>
    }
    <!-- Applications Windows -->
    <div class="absolute inset-0 pointer-events-none"></div>
  </div>
</main>
