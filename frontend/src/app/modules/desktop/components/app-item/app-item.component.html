<button
  class="flex flex-col items-center gap-1 border border-transparent bg-transparent p-2 cursor-pointer w-[100px] text-white rounded transition-all hover:bg-white/10 hover:border-white/20"
  type="button"
  [title]="$appData().name">
  <div class="w-[54px] h-[54px] flex items-center justify-center">
    <img
      [ngSrc]="$appData().icon"
      [alt]="$appData().name"
      width="48"
      height="48"
      class="drop-shadow-md" />
  </div>
  <span class="text-[12px] text-center drop-shadow-lg truncate w-full">
    {{ $appData().name }}
  </span>
</button>
