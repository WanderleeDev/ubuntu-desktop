<div class="flex flex-col items-center gap-12 py-12 animate-fade-in">
  <a
    class="group flex flex-col items-center px-4 rounded-2xl transition-all duration-300 hover:bg-white/5 active:scale-95 focus:outline-none focus:ring-2 focus:ring-orange-500/50"
    title="authenticate"
    routerLink="/login">
    <app-personal-user-card class="block" />
  </a>

  <div class="flex flex-col items-center gap-6">
    <a
      class="text-sm font-medium text-white/40 hover:text-white/90 transition-all duration-200 hover:underline underline-offset-4"
      routerLink="/register">
      Not on the list?
    </a>

    <button
      (click)="onClick()"
      #btn
      class="group relative flex items-center justify-center px-8 py-3 rounded-full overflow-hidden transition-all duration-300 active:scale-95"
      type="button">
      <div
        class="absolute inset-0 bg-white/5 group-hover:bg-white/10 backdrop-blur-md border border-white/10 transition-colors duration-300"></div>

      <div class="relative flex items-center gap-2">
        <span
          class="material-symbols-outlined text-white/60 group-hover:text-white transition-colors duration-200 text-xl"
          >person_outline</span
        >
        <span
          class="text-sm font-semibold text-white/60 group-hover:text-white transition-colors duration-200">
          Sign in as a guest
        </span>
      </div>
    </button>
  </div>
</div>

@defer (on hover(btn)) {
  @if (isReadyToNavigate()) {
    <app-screen-lock redirectRoute="/home" />
  }
}
