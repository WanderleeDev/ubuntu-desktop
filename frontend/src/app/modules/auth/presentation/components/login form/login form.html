<form
  class="flex flex-col items-center gap-6 animate-fade-in w-full max-w-sm"
  [formGroup]="formLogin">
  <div class="flex items-center w-full gap-3">
    <a
      class="group flex items-center justify-center w-9 h-9 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-system/50"
      routerLink="/"
      title="volver atrás">
      <span
        class="material-symbols-outlined text-white/50 group-hover:text-white transition-colors duration-200 text-xl"
        >arrow_back</span
      >
    </a>

    <div class="relative flex-1 group">
      <input
        class="w-full bg-white/5 border border-white/10 rounded-lg pl-4 pr-10 py-2 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-system/50 focus:bg-white/10 transition-all duration-200 shadow-inner"
        (keydown.enter)="onSubmit()"
        formControlName="password"
        [type]="inputTypeStream()"
        placeholder="Password"
        name="password"
        id="password" />

      <button
        class="absolute right-1 top-1/2 -translate-y-1/2 flex items-center justify-center w-8 h-8 rounded-md text-white/40 hover:text-white/80 transition-colors duration-200 focus:outline-none"
        (click)="toggleInputType()"
        [title]="labelStream()"
        type="button">
        <span class="material-symbols-outlined text-xl">
          {{ isPasswordInput() ? "visibility_off" : "visibility" }}
        </span>
      </button>
    </div>

    <button
      (click)="onSubmit()"
      [disabled]="formLogin.invalid || authStore.loading()"
      class="flex items-center justify-center w-9 h-9 rounded-full bg-system-active hover:bg-system-hover disabled:bg-white/5 disabled:text-white/20 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-system/50 active:scale-95 relative"
      type="button">
      @if (authStore.loading()) {
      <span class="material-symbols-outlined text-white text-xl animate-spin"
        >refresh</span
      >
      } @else {
      <span class="material-symbols-outlined text-white text-xl"
        >chevron_right</span
      >
      }
    </button>
  </div>

  @if (authStore.error()) {
  <div
    class="w-full p-3 rounded-lg bg-red-500/10 border border-red-500/20 animate-fade-in">
    <p class="text-red-400 text-xs text-center">{{ authStore.error() }}</p>
  </div>
  }
</form>

@defer (when formLogin.valid) { @if (isReadyToNavigate()) {
<app-screen-lock redirectRoute="" />
} }
