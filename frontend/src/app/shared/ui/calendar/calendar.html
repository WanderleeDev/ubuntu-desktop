<div
  class="flex flex-col md:flex-row gap-6 p-6 bg-[#2d2d2d]/95 backdrop-blur-2xl rounded-[24px] border border-white/10 shadow-2xl w-[95vw] md:w-auto min-w-[300px] md:min-w-[700px] max-w-[95vw] md:max-w-none text-white animate-in fade-in zoom-in-95 duration-300">
  <div
    class="flex-1 flex flex-col gap-6 md:pr-6 md:border-r border-b md:border-b-0 border-white/5 pb-6 md:pb-0">
    <header class="flex justify-center md:justify-start">
      <app-clock
        [configClock]="{
          isSimple: false,
          hasIcons: false,
          hasDayAndMonth: true,
          type: 'regular',
        }"
        class="w-full" />
    </header>

    <div class="flex-1 flex flex-col gap-4 overflow-hidden">
      <h3
        class="text-xs font-bold text-white/40 uppercase tracking-widest px-2">
        Notifications
      </h3>
      <div
        class="flex-1 bg-white/5 rounded-2xl p-4 flex flex-col items-center justify-center text-center gap-3 border border-white/5">
        <span class="text-3xl opacity-50">🔔</span>
        <p class="text-sm text-white/60 font-medium">No new notifications</p>
      </div>

      <div
        class="flex items-center justify-between p-4 bg-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition-colors border border-white/5 mt-auto">
        <span class="text-sm font-medium text-white/80">Silent Mode</span>
        <app-switch [(checked)]="isSilentMode" />
      </div>
    </div>
  </div>

  <div class="flex-1 flex flex-col gap-6">
    <div class="flex flex-col gap-1">
      <time class="text-sm font-bold text-system uppercase tracking-wider">
        {{ actuallyDate() | date: "EEEE" }}
      </time>
      <time class="text-2xl font-light">
        {{ actuallyDate() | date: "MMMM d, y" }}
      </time>
    </div>

    <div class="bg-white/5 rounded-2xl p-6 border border-white/5">
      <div class="grid grid-cols-7 gap-1 mb-4">
        @for (day of daysOfWeek; track day) {
        <span class="text-center text-[10px] font-bold text-white/30 uppercase"
          >{{ day }}</span
        >
        }
      </div>

      <div class="grid grid-cols-7 gap-1">
        @for (item of calendarDays(); track $index) {
        <div
          class="aspect-square flex items-center justify-center text-sm rounded-full transition-all duration-200"
          [class.hover:bg-white/10]="$index >= 0"
          [class.bg-system]="item.current"
          [class.text-white]="item.current"
          [class.text-white/80]="!item.current"
          [class.cursor-pointer]="item.day !== ''">
          {{ item.day }}
        </div>
        }
      </div>
    </div>

    <div class="flex flex-col gap-3">
      <h3
        class="text-xs font-bold text-white/40 uppercase tracking-widest px-2">
        Events
      </h3>
      <div
        class="p-4 bg-white/5 rounded-2xl border border-white/5 flex items-center gap-4 group hover:bg-white/10 transition-colors cursor-pointer">
        <div class="w-1 h-8 bg-system rounded-full"></div>
        <div class="flex flex-col">
          <span class="text-sm font-semibold">No events scheduled</span>
          <span class="text-xs text-white/40">Enjoy your day!</span>
        </div>
      </div>
    </div>
  </div>
</div>
