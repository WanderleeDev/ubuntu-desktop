<figure
  class="flex flex-col items-center gap-10 py-12 animate-fade-in w-full max-w-md mx-auto">
  <figcaption class="text-3xl font-light tracking-wide text-white/95">
    Registro rápido
  </figcaption>

  <div
    class="flex items-center justify-center gap-6 p-6 rounded-3xl bg-white/5 border border-white/10 backdrop-blur-md shadow-xl">
    @for (social of socialMedia; track $index) {
      <button 
        class="flex items-center justify-center w-12 h-12 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/10 transition-all duration-300 hover:scale-110 active:scale-95 group"
        type="button"
      >
        <img 
          [src]="social" 
          class="w-6 h-6 opacity-50 group-hover:opacity-100 transition-opacity duration-200" 
          alt="social icon" 
        />
      </button>
    }

  </div>

  <a
    class="group flex items-center gap-2 px-6 py-2 rounded-full text-sm font-medium text-white/40 hover:text-white/90 hover:bg-white/5 transition-all duration-200"
    routerLink="/">
    <span
      class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform duration-200"
      >arrow_back</span
    >
    <span>Volver atrás</span>
  </a>
</figure>
