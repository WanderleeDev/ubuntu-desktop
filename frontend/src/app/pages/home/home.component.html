<main
  class="w-screen h-screen overflow-hidden flex flex-col bg-gradient-to-br from-[#4c1141] via-[#772953] to-[#e95420] relative">
  <app-navbar-desktop />
  <app-sidebar [$mainIcons]="mainIcons" [$secondaryIcons]="secondaryIcons" />
  <app-desktop>
    <app-list-app>
      @for (icon of desktopIcons; track icon.id) {
        <li class="list-none">
          <app-app-item [$appData]="icon" [lazeComponent]="APPS[icon.app]" />
        </li>
      }
    </app-list-app>
  </app-desktop>
</main>
